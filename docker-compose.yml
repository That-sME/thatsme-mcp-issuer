version: "3.3"

services:
  mcp-issuer:
    build: .
    ports:
      - "3010:3010"
    environment:
      - THATSME_API_URL=http://host.docker.internal:3004/api
      - THATSME_API_KEY=${THATSME_API_KEY}
      - MCP_TRANSPORT=http
      - MCP_PORT=3010
      - MCP_ALLOWED_HOSTS=mcp.thatsme.com.br,localhost,127.0.0.1
    restart: unless-stopped
