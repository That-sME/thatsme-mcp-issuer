name: Deploy thatsme-mcp-issuer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Test without API key
        run: |
          node dist/index.js 2>&1 | grep -q "THATSME_API_KEY is required" && \
          echo "API key validation works" || exit 1

      - name: Test tools/list (stdio)
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' | \
          THATSME_API_KEY=test timeout 5 node dist/index.js | \
          grep -q "search_events" && echo "tools/list OK" || exit 1

      - name: Test health endpoint (HTTP mode)
        run: |
          MCP_TRANSPORT=http MCP_PORT=3010 THATSME_API_KEY=test \
          node dist/index.js &
          sleep 2
          curl -sf http://localhost:3010/health | grep -q "ok" && \
          echo "Health OK" || exit 1
          kill %1 2>/dev/null || true

  publish-npm:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build

      - name: Publish to npm (if version changed)
        run: |
          PUBLISHED=$(npm view thatsme-mcp-issuer version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            npm publish --access public --provenance
            echo "Published thatsme-mcp-issuer@$LOCAL"
          else
            echo "Version $LOCAL already published, skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  check-deploy-secrets:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - name: Check if deploy secrets exist
        id: check
        run: |
          if [ -n "${{ secrets.MCP_SERVER_HOST }}" ]; then
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=false" >> $GITHUB_OUTPUT
            echo "::warning::MCP_SERVER_HOST not configured, deploy-remote will be skipped"
          fi

  deploy-remote:
    needs: [check-deploy-secrets, publish-npm]
    runs-on: ubuntu-latest
    if: needs.check-deploy-secrets.outputs.has-secrets == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run build

      - name: Ensure target directory exists
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MCP_SERVER_HOST }}
          username: ${{ secrets.MCP_SERVER_USER }}
          key: ${{ secrets.MCP_SERVER_KEY }}
          script: sudo mkdir -p /opt/thatsme-mcp && sudo chown $USER:$USER /opt/thatsme-mcp

      - name: Sync files to server
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.MCP_SERVER_KEY }}
          ARGS: "-rltgoDzvO --exclude=node_modules --exclude=.git --exclude=src"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.MCP_SERVER_HOST }}
          REMOTE_USER: ${{ secrets.MCP_SERVER_USER }}
          TARGET: "/opt/thatsme-mcp/"

      - name: Install nginx vhost (idempotent)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MCP_SERVER_HOST }}
          username: ${{ secrets.MCP_SERVER_USER }}
          key: ${{ secrets.MCP_SERVER_KEY }}
          script: |
            set -e
            if [ -d /etc/nginx/sites-available ]; then
              sudo cp /opt/thatsme-mcp/nginx.conf /etc/nginx/sites-available/mcp-thatsme
              sudo ln -sf /etc/nginx/sites-available/mcp-thatsme /etc/nginx/sites-enabled/mcp-thatsme
            else
              sudo cp /opt/thatsme-mcp/nginx.conf /etc/nginx/conf.d/mcp-thatsme.conf
            fi
            sudo nginx -t
            if sudo systemctl is-active --quiet nginx; then
              sudo systemctl reload nginx
              echo "nginx reloaded"
            else
              sudo systemctl enable --now nginx
              echo "nginx started"
            fi

      - name: Rebuild and restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MCP_SERVER_HOST }}
          username: ${{ secrets.MCP_SERVER_USER }}
          key: ${{ secrets.MCP_SERVER_KEY }}
          script: |
            set -e
            cd /opt/thatsme-mcp
            if [ ! -f .env ]; then
              echo "::warning::.env missing on server — container will refuse to start. Create /opt/thatsme-mcp/.env with THATSME_API_KEY=<key> and re-run."
              exit 0
            fi
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi
            $DC up -d --build --force-recreate
            sleep 3
            curl -sf http://localhost:3010/health || echo "Health check failed"
